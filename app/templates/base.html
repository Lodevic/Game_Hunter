<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Game Hunter{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: #111;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
      margin-left: auto;
      margin-right: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: #aaa;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #fff; }
    .nav-links a.active { color: #e63946; }

    .nav-right { display: flex; align-items: center; gap: 14px; }

    .avatar-icon {
      width: 36px; height: 36px;
      background: #2a2a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .avatar-icon:hover { background: #3a3a3a; }
    .avatar-icon svg { width: 20px; height: 20px; fill: #aaa; }

    .content { flex: 1; }

    /* ── FOOTER ── */
    footer {
      background: #111;
      border-top: 1px solid #1f1f1f;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .footer-logo span { color: #e63946; }
    .footer-left p { font-size: 0.82rem; color: #666; line-height: 1.6; }
    .footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .footer-right p { font-size: 0.85rem; color: #666; }
    .socials { display: flex; gap: 10px; }

    .social-btn {
      width: 34px; height: 34px;
      background: #2a2a2a;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .social-btn:hover { background: #e63946; }
    .social-btn svg { width: 17px; height: 17px; fill: #f0f0f0; }

    /* ══════════════════════════════════
       GLOBAL POPUP — dark gaming theme
       Cukup tulis sekali di sini,
       semua halaman langsung bisa pakai
    ══════════════════════════════════ */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }

    .popup-overlay.show { opacity: 1; pointer-events: all; }

    .popup {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      width: 660px;
      max-width: 92vw;
      position: relative;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 32px 80px rgba(0,0,0,0.9);
      overflow: hidden;
    }

    .popup-overlay.show .popup { transform: translateY(0) scale(1); }

    .popup::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, #e63946, #ff6b6b, #e63946);
      background-size: 200%;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .popup-close {
      position: absolute;
      top: 16px; right: 18px;
      background: #222;
      border: 1px solid #333;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      color: #aaa;
      transition: background 0.2s, color 0.2s;
      z-index: 5;
    }

    .popup-close:hover { background: #e63946; color: #fff; border-color: #e63946; }

    .popup-body {
      display: flex;
      gap: 24px;
      padding: 28px;
    }

    .popup-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 160px;
    }

    .popup-cover {
      width: 160px;
      height: 210px;
      border-radius: 10px;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }

    .popup-game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-top: 14px;
      line-height: 1.4;
      letter-spacing: 1px;
    }

    .btn-favorit {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1.5px solid #e63946;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #e63946;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-favorit:hover { background: #e63946; color: #fff; transform: translateY(-1px); }

    .popup-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 4px;
    }

    .popup-info-row { display: flex; gap: 8px; font-size: 0.9rem; line-height: 1.5; }
    .popup-info-label { color: #666; font-weight: 600; white-space: nowrap; min-width: 100px; }
    .popup-info-value { color: #ddd; font-weight: 600; }
    .popup-divider { height: 1px; background: #222; margin: 8px 0; }
    .popup-tag-title { font-size: 0.8rem; font-weight: 700; color: #666; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .popup-tags, .popup-fitur-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .popup-tag { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 4px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; color: #aaa; }
    .popup-fitur-item { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 4px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; color: #7a8fff; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a href="/" class="logo">GAME HUNTER</a>
  <ul class="nav-links">
    <li><a href="/dashboard" class="{{ 'active' if active_page == 'dashboard' }}">Dashboard</a></li>
    <li><a href="/rekomendasi" class="{{ 'active' if active_page == 'rekomendasi' }}">Game Rekomendasi</a></li>
    <li><a href="/search" class="{{ 'active' if active_page == 'search' }}">Search Games</a></li>
    <li><a href="/favorit" class="{{ 'active' if active_page == 'favorit' }}">Favorit Game</a></li>
  </ul>
  <div class="nav-right">
    <div class="avatar-icon">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
  </div>
</nav>

<!-- KONTEN HALAMAN -->
<div class="content">{% block content %}{% endblock %}</div>

<!-- FOOTER -->
<footer>
  <div class="footer-left">
    <div class="footer-logo"><span>© 2025</span> GAME HUNTER</div>
    <p>Contact us<br>gamehunterz@gmail.com<br>+6281234567890</p>
  </div>
  <div class="footer-right">
    <p>Follow us</p>
    <div class="socials">
      <a class="social-btn" href="#">
        <svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4c0 3.2-2.6 5.8-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8C2 4.6 4.6 2 7.8 2zm-.2 2C5.6 4 4 5.6 4 7.6v8.8C4 18.4 5.6 20 7.6 20h8.8c2 0 3.6-1.6 3.6-3.6V7.6C20 5.6 18.4 4 16.4 4H7.6zm9.65 1.5c.7 0 1.25.55 1.25 1.25S17.95 8 17.25 8 16 7.45 16 6.75s.55-1.25 1.25-1.25zM12 7c2.8 0 5 2.2 5 5s-2.2 5-5 5-5-2.2-5-5 2.2-5 5-5zm0 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
      </a>
      <a class="social-btn" href="#">
        <svg viewBox="0 0 24 24"><path d="M21.6 7.2s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.1 4 12 4 12 4s-4.1 0-6.8.3c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S2 8.7 2 10.3v1.5c0 1.5.2 3.1.2 3.1s.2 1.4.8 2c.8.8 1.8.8 2.2.9C6.7 18 12 18 12 18s4.1 0 6.8-.3c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.5.2-3.1v-1.5C22 8.7 21.6 7.2 21.6 7.2zM10 14.5v-5l5 2.5-5 2.5z"/></svg>
      </a>
      <a class="social-btn" href="#">
        <svg viewBox="0 0 24 24"><path d="M19.6 3.8c-1-.6-1.7-1.6-2-2.8h-3.1v13.4c0 1.4-1.1 2.5-2.5 2.5s-2.5-1.1-2.5-2.5 1.1-2.5 2.5-2.5c.2 0 .5 0 .7.1V8.8c-.2 0-.5-.1-.7-.1C8 8.7 5 11.7 5 15.4s3 6.6 6.6 6.6 6.6-3 6.6-6.6V9.2c1.3.9 2.8 1.5 4.4 1.5V7.5c-.9 0-2.2-.5-3-1.7l1-.2z"/></svg>
      </a>
    </div>
  </div>
</footer>

<!-- ══ GLOBAL POPUP — tinggal panggil openPopup(games['key']) dari halaman manapun ══ -->
<div class="popup-overlay" id="popupOverlay" onclick="closeOnOverlay(event)">
  <div class="popup">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-body">
      <div class="popup-left">
        <div class="popup-cover" id="popupCover"></div>
        <div class="popup-game-title" id="popupTitle"></div>
        <button class="btn-favorit">♥ Favorit</button>
      </div>
      <div class="popup-info" id="popupInfo"></div>
    </div>
  </div>
</div>

<script>
  function openPopup(g) {
    document.getElementById('popupCover').className = 'popup-cover ' + g.coverClass;
    document.getElementById('popupCover').textContent = g.coverText;
    document.getElementById('popupTitle').textContent = g.title;

    const tags = g.genre.split(',').map(t => `<span class="popup-tag">${t.trim()}</span>`).join('');
    const fiturs = g.fitur.split(',').map(f => `<span class="popup-fitur-item">${f.trim()}</span>`).join('');

    document.getElementById('popupInfo').innerHTML = `
      <div class="popup-info-row"><span class="popup-info-label">Developer</span><span class="popup-info-value">${g.developer}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Tanggal Rilis</span><span class="popup-info-value">${g.rilis}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Harga</span><span class="popup-info-value">${g.harga}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Rating</span><span class="popup-info-value">${g.rating}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Rating Usia</span><span class="popup-info-value">${g.usia}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Platform</span><span class="popup-info-value">${g.platform}</span></div>
      <div class="popup-divider"></div>
      <div class="popup-tag-title">Genre / Tag</div>
      <div class="popup-tags">${tags}</div>
      <div class="popup-divider"></div>
      <div class="popup-tag-title">Fitur Gameplay</div>
      <div class="popup-fitur-list">${fiturs}</div>
    `;
    document.getElementById('popupOverlay').classList.add('show');
  }

  function closePopup() { document.getElementById('popupOverlay').classList.remove('show'); }
  function closeOnOverlay(e) { if (e.target === document.getElementById('popupOverlay')) closePopup(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });
</script>

{% block extra_script %}{% endblock %}

</body>
</html>
