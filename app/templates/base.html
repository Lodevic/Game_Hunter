<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Game Hunter{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: #111;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
      margin-left: auto;
      margin-right: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: #aaa;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #fff; }
    .nav-links a.active { color: #e63946; }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* Avatar */
    .avatar-icon {
      width: 36px; height: 36px;
      background: #2a2a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .avatar-icon:hover { background: #3a3a3a; }
    .avatar-icon svg { width: 20px; height: 20px; fill: #aaa; }

    /* Tombol Exit */
    .btn-exit {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: transparent;
      border: 1.5px solid #333;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      text-decoration: none;
    }

    .btn-exit:hover {
      background: #e63946;
      border-color: #e63946;
      color: #fff;
    }

    .btn-exit svg {
      width: 15px; height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── KONFIRMASI LOGOUT ── */
    .logout-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(4px);
    }

    .logout-overlay.show { opacity: 1; pointer-events: all; }

    .logout-box {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 40px;
      width: 360px;
      max-width: 90vw;
      text-align: center;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .logout-overlay.show .logout-box { transform: scale(1); }

    .logout-box::before {
      content: '';
      display: block;
      width: 56px; height: 56px;
      background: rgba(230,57,70,0.12);
      border-radius: 50%;
      margin: 0 auto 16px;
    }

    .logout-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
      margin-top: -56px;
      line-height: 56px;
    }

    .logout-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .logout-desc {
      font-size: 0.9rem;
      color: #666;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .logout-actions { display: flex; gap: 12px; justify-content: center; }

    .btn-cancel {
      padding: 10px 24px;
      background: transparent;
      border: 1.5px solid #333;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancel:hover { border-color: #555; color: #fff; }

    .btn-confirm-exit {
      padding: 10px 24px;
      background: #e63946;
      border: none;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-confirm-exit:hover { background: #c0303b; }

    .content { flex: 1; }

    /* ── FOOTER ── */
    footer {
      background: #111;
      border-top: 1px solid #1f1f1f;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .footer-logo span { color: #e63946; }
    .footer-left p { font-size: 0.82rem; color: #666; line-height: 1.6; }
    .footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .footer-right p { font-size: 0.85rem; color: #666; }
    .socials { display: flex; gap: 10px; }

    .social-btn {
      width: 34px; height: 34px;
      background: #2a2a2a;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .social-btn:hover { background: #e63946; }
    .social-btn svg { width: 17px; height: 17px; fill: #f0f0f0; }

    /* ── TANDA ♥ DI CARD FAVORIT ── */
    .fav-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.65);
      color: #e63946;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── GLOBAL POPUP ── */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }

    .popup-overlay.show { opacity: 1; pointer-events: all; }

    .popup {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      width: 660px;
      max-width: 92vw;
      position: relative;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 32px 80px rgba(0,0,0,0.9);
      overflow: hidden;
    }

    .popup-overlay.show .popup { transform: translateY(0) scale(1); }

    .popup::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, #e63946, #ff6b6b, #e63946);
      background-size: 200%;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .popup-close {
      position: absolute;
      top: 16px; right: 18px;
      background: #222;
      border: 1px solid #333;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      color: #aaa;
      transition: background 0.2s, color 0.2s;
      z-index: 5;
    }

    .popup-close:hover { background: #e63946; color: #fff; border-color: #e63946; }

    .popup-body { display: flex; gap: 24px; padding: 28px; }

    .popup-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 160px;
    }

    .popup-cover {
      width: 160px; height: 210px;
      border-radius: 10px;
      display: flex; align-items: flex-end;
      padding: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem; font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      letter-spacing: 1px;
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    .popup-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.05) 60%);
      z-index: 0;
    }

    .popup-cover span { position: relative; z-index: 1; }

    .popup-game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem; font-weight: 900;
      color: #fff; text-align: center;
      margin-top: 14px; line-height: 1.4; letter-spacing: 1px;
    }

    .btn-favorit {
      margin-top: 14px; width: 100%; padding: 10px;
      background: transparent;
      border: 1.5px solid #e63946;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      color: #e63946; cursor: pointer; letter-spacing: 1px;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-favorit:hover { background: #e63946; color: #fff; transform: translateY(-1px); }
    .btn-favorit.saved { background: #e63946; color: #fff; }

    /* Tombol Steam */
    .btn-steam {
      margin-top: 8px; width: 100%; padding: 9px;
      background: #1b2838;
      border: 1.5px solid #2a475e;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem; font-weight: 700;
      color: #c7d5e0;
      cursor: pointer; letter-spacing: 0.5px;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-steam:hover { background: #2a475e; border-color: #4a90d9; color: #fff; }

    .btn-steam svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    .popup-info {
      flex: 1; display: flex; flex-direction: column;
      gap: 6px; padding-top: 4px;
    }

    .popup-info-row { display: flex; gap: 8px; font-size: 0.9rem; line-height: 1.5; }
    .popup-info-label { color: #666; font-weight: 600; white-space: nowrap; min-width: 100px; }
    .popup-info-value { color: #ddd; font-weight: 600; }
    .popup-divider { height: 1px; background: #222; margin: 8px 0; }
    .popup-tag-title { font-size: 0.8rem; font-weight: 700; color: #666; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .popup-tags, .popup-fitur-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .popup-tag { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 4px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; color: #aaa; }
    .popup-fitur-item { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 4px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; color: #7a8fff; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<!-- KONFIRMASI LOGOUT -->
<div class="logout-overlay" id="logoutOverlay" onclick="closeLogout(event)">
  <div class="logout-box">
    <span class="logout-icon">🚪</span>
    <div class="logout-title">KELUAR?</div>
    <p class="logout-desc">Kamu yakin ingin keluar dari<br>Game Hunter?</p>
    <div class="logout-actions">
      <button class="btn-cancel" onclick="hideLogout()">Batal</button>
      <button class="btn-confirm-exit" onclick="doLogout()">Ya, Keluar</button>
    </div>
  </div>
</div>

<!-- GLOBAL POPUP -->
<div class="popup-overlay" id="popupOverlay" onclick="closeOnOverlay(event)">
  <div class="popup">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-body">
      <div class="popup-left">
        <div class="popup-cover" id="popupCover"><span id="popupCoverText"></span></div>
        <div class="popup-game-title" id="popupTitle"></div>
        <button class="btn-favorit" id="btnFavorit" onclick="toggleFavorit()">♥ Favorit</button>
        <a class="btn-steam" id="btnSteam" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.52 3.73 10.17 8.84 11.54L12.53 18c.16-.61.1-1.26-.2-1.84l-1.18-2.28a3.27 3.27 0 0 0-1.42-3.7 3.27 3.27 0 0 0-4.46 1.2L3.5 9.5A8.5 8.5 0 0 1 12 3.5a8.5 8.5 0 0 1 8.5 8.5 8.5 8.5 0 0 1-8.5 8.5h-.15l-3.2 3.27A12 12 0 0 0 12 24c6.63 0 12-5.37 12-12S18.63 0 12 0zm-1.77 15.5a2 2 0 0 1-2-2 2 2 0 0 1 2-2 2 2 0 0 1 2 2 2 2 0 0 1-2 2z"/></svg>
          Buka di Steam
        </a>
      </div>
      <div class="popup-info" id="popupInfo"></div>
    </div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
  /* ── LOGOUT ── */
  function showLogout() {
    document.getElementById('logoutOverlay').classList.add('show');
  }

  function hideLogout() {
    document.getElementById('logoutOverlay').classList.remove('show');
  }

  function closeLogout(e) {
    if (e.target === document.getElementById('logoutOverlay')) hideLogout();
  }

  function doLogout() {
    window.location.href = '/logout';
  }

  /* ── FAVORIT — DB based ── */
  let currentGameKey = null;
  let favIds = new Set();

  // Load favorit dari server saat halaman dibuka
  async function loadFavIds() {
    try {
      const res = await fetch('/favorit/list');
      const data = await res.json();
      favIds = new Set(data.favorites.map(String));
      markFavorites();
    } catch(e) {}
  }

  async function toggleFavorit() {
    if (!currentGameKey) return;
    const btn = document.getElementById('btnFavorit');
    btn.disabled = true;
    try {
      const res = await fetch('/favorit/toggle', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({game_id: parseInt(currentGameKey)})
      });
      const data = await res.json();
      if (data.status === 'added') {
        favIds.add(String(currentGameKey));
        btn.textContent = '♥ Tersimpan!';
        btn.classList.add('saved');
      } else {
        favIds.delete(String(currentGameKey));
        btn.textContent = '♥ Favorit';
        btn.classList.remove('saved');
      }
      markFavorites();
    } catch(e) {}
    btn.disabled = false;
  }

  function markFavorites() {
    // Hanya hapus badge yang dibuat dinamis (bukan yang hardcode di HTML favorit.html)
    document.querySelectorAll('.fav-badge.dynamic').forEach(el => el.remove());
    document.querySelectorAll('.game-card, .game-card-popular').forEach(card => {
      const onclick = card.getAttribute('onclick') || '';
      const match = onclick.match(/dbGames\[(\d+)\]/);
      if (match && favIds.has(match[1])) {
        // Jangan tambah kalau sudah ada badge (hardcode di favorit.html)
        if (!card.querySelector('.fav-badge')) {
          const badge = document.createElement('div');
          badge.className = 'fav-badge dynamic';
          badge.textContent = '♥';
          card.style.position = 'relative';
          card.appendChild(badge);
        }
      }
    });
  }

  loadFavIds();

  /* ── POPUP ── */
  function openPopup(g) {
    if (!g) { console.error('openPopup: game object undefined'); return; }
    currentGameKey = String(g.key);

    // Cover — pakai gambar dari API kalau ada, fallback ke gradient
    const cover = document.getElementById('popupCover');
    cover.className = 'popup-cover ' + (g.coverClass || '');
    if (g.image) {
      cover.style.backgroundImage = `url('${g.image}')`;
    } else {
      cover.style.backgroundImage = '';
    }
    document.getElementById('popupCoverText').textContent = g.coverText || g.title;
    document.getElementById('popupTitle').textContent = g.title;

    // Tombol favorit
    const btn = document.getElementById('btnFavorit');
    if (favIds.has(String(g.key))) {
      btn.textContent = '♥ Tersimpan!';
      btn.classList.add('saved');
    } else {
      btn.textContent = '♥ Favorit';
      btn.classList.remove('saved');
    }

    // Tombol Steam — link ke halaman pencarian Steam
    const steamBtn = document.getElementById('btnSteam');
    const steamSearch = 'https://store.steampowered.com/search/?term=' + encodeURIComponent(g.title);
    steamBtn.href = steamSearch;

    const tags   = (g.genre || '-').split(',').map(t => `<span class="popup-tag">${t.trim()}</span>`).join('');
    const fiturs = (g.fitur || '-').split(',').map(f => `<span class="popup-fitur-item">${f.trim()}</span>`).join('');

    document.getElementById('popupInfo').innerHTML = `
      <div class="popup-info-row"><span class="popup-info-label">Developer</span><span class="popup-info-value">${g.developer || '-'}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Tanggal Rilis</span><span class="popup-info-value">${g.rilis || '-'}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Harga</span><span class="popup-info-value">${g.harga || '-'}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Rating</span><span class="popup-info-value">${g.rating || '-'}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Rating Usia</span><span class="popup-info-value">${g.usia || '-'}</span></div>
      <div class="popup-info-row"><span class="popup-info-label">Platform</span><span class="popup-info-value">${g.platform || '-'}</span></div>
      <div class="popup-divider"></div>
      <div class="popup-tag-title">Genre / Tag</div>
      <div class="popup-tags">${tags}</div>
      <div class="popup-divider"></div>
      <div class="popup-tag-title">Fitur Gameplay</div>
      <div class="popup-fitur-list">${fiturs}</div>
    `;
    document.getElementById('popupOverlay').classList.add('show');
  }

  function closePopup()    { document.getElementById('popupOverlay').classList.remove('show'); }
  function closeOnOverlay(e) { if (e.target === document.getElementById('popupOverlay')) closePopup(); }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePopup(); hideLogout(); }
  });

</script>

{% block extra_script %}{% endblock %}

</body>
</html>
